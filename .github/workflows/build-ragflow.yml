name: Build RAGFlow to GitHub Releases

on:
  workflow_dispatch: 
  push:
    tags:
      - 'v*' 

permissions:
  contents: write 
  packages: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 
          fetch-tags: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'arm64'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache UV
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Install UV
        run: pip install uv

      - name: Download Dependencies
        run: uv run download_deps.py
        env:
          UV_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Build ragflow_deps Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.deps
          push: false
          platforms: linux/arm64
          tags: infiniflow/ragflow_deps:latest
          outputs: type=docker,dest=/tmp/ragflow_deps.tar

      - name: Build ragflow:nightly Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/arm64
          tags: infiniflow/ragflow:nightly
          outputs: type=docker,dest=/tmp/ragflow_nightly.tar
      # --- 新增步骤：上传产物 ---
      - name: Upload ragflow_nightly Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ragflow_nightly-image
          path: /tmp/ragflow_nightly.tar
          retention-days: 5
      # --- 新增步骤：上传产物 ---
      - name: Upload ragflow_nightly Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ragflow_nightly-image
          path: /tmp/ragflow_deps.tar
          retention-days: 5
