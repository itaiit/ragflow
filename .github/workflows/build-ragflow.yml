name: Build RAGFlow to GitHub Releases

on:
  workflow_dispatch: # 允许手动触发
  push:
    tags:
      - 'v*' # 也可以设置为推送标签时触发

# 权限设置：官方配置中显式声明了权限，这是最佳实践
permissions:
  contents: write # 必须写入权限才能创建 Release 和上传附件
  packages: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # --- 1. 代码检出 ---
      # 修正点1：官方使用的是 actions/checkout@v6，这是最新的版本，必须更新
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 获取所有历史记录，这对版本控制和依赖管理很重要
          fetch-tags: true

      # --- 2. 环境准备 ---
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'arm64'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache UV
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Install UV
        run: pip install uv

      - name: Download Dependencies
        run: uv run download_deps.py
        env:
          UV_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple

      # --- 3. 构建 ragflow_deps ---
      - name: Build ragflow_deps Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.deps
          push: false
          platforms: linux/arm64
          tags: infiniflow/ragflow_deps:latest
          outputs: type=docker,dest=/tmp/ragflow_deps.tar

      # --- 4. 构建 ragflow:nightly ---
      - name: Build ragflow:nightly Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/arm64
          tags: infiniflow/ragflow:nightly
          outputs: type=docker,dest=/tmp/ragflow_nightly.tar

      # --- 5. 创建 Release 并上传 ---
      # 修正点2：参考官方配置，使用 v2 版本，并显式传递 token
      - name: Create Release and Upload Images
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 显式传递 Token，确保权限
          tag_name: auto-build-${{ github.run_number }}
          name: RAGFlow Build #${{ github.run_number }}
          body: |
            自动构建的 RAGFlow Docker 镜像 (ARM64 架构)。
            
            ### 安装说明
            1. 下载下方的 `.tar` 文件。
            2. 在本地终端运行：
               ```bash
               docker load -i ragflow_nightly.tar
               docker load -i ragflow_deps.tar
               ```
          draft: false
          # 修正点3：直接将构建产物路径填入 files，不需要先 upload-artifact 再下载
          files: |
            /tmp/ragflow_deps.tar
            /tmp/ragflow_nightly.tar
